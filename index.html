<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Eccentricity Demonstrator</title>

  <!-- KL-UNL shared foundation (copied in unchanged) -->
  <link href="foundation/kl-unl.css" type="text/css" rel="stylesheet" media="all">
  <!-- Sim-specific styles layered on top of the foundation (foundation never edited) -->
  <link href="styles/styles.css" type="text/css" rel="stylesheet" media="all">
</head>
<body>
  <a class="sr-only sr-only-focusable" href="#controls-heading">Skip to controls</a>

  <!-- aria-live status region: announces state changes (on commit) with units/context. -->
  <p id="sr-status" class="sr-only" aria-live="polite"></p>

  <div class="app-shell">

    <!-- Title bar + Reset / Help / About come from the shared masthead component.
         It renders the <h1>, reads text from foundation/contents.json by sim-id
         ("ellipsedemo"), and dispatches a "sim-reset" event we listen for. -->
    <kl-unl-masthead sim-id="ellipsedemo" json-url="foundation/contents.json"></kl-unl-masthead>

    <main class="sim-main">

      <!-- =====================================================================
           ONE PANEL ("1 box"): the whole demonstrator lives in a single .panel,
           mirroring the original Flash stage, which was one bordered box holding
           the ellipse on the left and the equation + sliders on the right. On
           narrow / portrait widths the two inner columns stack in reading order.
           ===================================================================== -->
      <section class="panel sim-panel" aria-labelledby="sim-heading">
        <h2 id="sim-heading" class="panel__heading">Eccentricity of an Ellipse</h2>

        <div class="sim-body">

          <!-- ---- LEFT: the ellipse diagram (code-drawn on canvas) ---- -->
          <div class="sim-diagram-col">
            <div class="panel__canvas-wrap sim-canvas-wrap">
              <!-- position:relative wrapper so the a / c variable labels can be
                   overlaid as real (MathJax) HTML rather than baked on the canvas. -->
              <div class="sim-canvas-stage">
                <canvas id="ellipse-canvas" role="img"
                        aria-label="Ellipse diagram"
                        aria-describedby="ellipse-desc"></canvas>
                <!-- The italic variables a (semi-major axis) and c (focal distance)
                     that label the two measurement arrows. Real HTML so they zoom
                     and expose the MathJax context menu. Positioned in JS. -->
                <span id="label-a" class="ellipse-var-label ellipse-var-label--a" aria-hidden="true">\(a\)</span>
                <span id="label-c" class="ellipse-var-label ellipse-var-label--c" aria-hidden="true">\(c\)</span>
              </div>
            </div>
            <p class="sim-attribution">
              <a href="https://astro.unl.edu/">astro.unl.edu</a>
            </p>
          </div>

          <!-- ---- RIGHT: live equation + the two sliders ---- -->
          <div class="sim-controls-col">

            <!-- Live eccentricity equation, typeset by MathJax via klunlShowEquation:
                 e = c / a = c/a = value. -->
            <div class="sim-equation">
              <div id="ecc-eqn" class="sim-equation__math" aria-hidden="true"></div>
              <p id="ecc-eqn-sr" class="sr-only"></p>
            </div>

            <div class="sim-control-body">
              <h3 id="controls-heading" class="sr-only">Ellipse controls</h3>

              <!-- c: focal distance (center to focus). Editable box + slider, both
                   bound to the same value (matches the original field + slider). -->
              <div class="control-row sim-slider-row">
                <span class="sim-var" aria-hidden="true">\(c\!:\)</span>
                <input class="sim-numbox" type="number" id="c-num"
                       min="0" max="79" step="1" value="60" inputmode="numeric"
                       aria-label="Focal distance c, in units">
                <input class="sim-slider" type="range" id="c-range"
                       min="0" max="79" step="1" value="60"
                       aria-label="Focal distance c slider"
                       aria-valuetext="focal distance c 60 units">
              </div>

              <!-- a: semi-major axis (center to vertex). Selectable range 40-100
                   (the original setRange(40,100)). -->
              <div class="control-row sim-slider-row">
                <span class="sim-var" aria-hidden="true">\(a\!:\)</span>
                <input class="sim-numbox" type="number" id="a-num"
                       min="40" max="100" step="1" value="80" inputmode="numeric"
                       aria-label="Semi-major axis a, in units">
                <input class="sim-slider" type="range" id="a-range"
                       min="40" max="100" step="1" value="80"
                       aria-label="Semi-major axis a slider"
                       aria-valuetext="semi-major axis a 80 units">
              </div>

              <p class="sim-hint" id="range-hint">
                The focal distance <em>c</em> is always less than the semi-major
                axis <em>a</em>, so the eccentricity stays below 1.
              </p>
            </div>

          </div>

        </div>

        <!-- Screen-reader description of what the diagram currently shows.
             Updated from state on commit (not per tick) so it is not chatty. -->
        <p id="ellipse-desc" class="sr-only" aria-live="polite"></p>
      </section>

    </main>
  </div>

  <!-- Foundation equation helper (copied in unchanged) -->
  <script src="foundation/kl-unl.js"></script>
  <!-- Shared masthead custom element (copied in unchanged) -->
  <script src="foundation/kl-unl-masthead.js"></script>

  <!-- MathJax (vendored locally; SVG output is self-contained, no CDN). The
       contextual menu ("Show Math As...") stays enabled on every symbol. -->
  <script>
    window.MathJax = {
      loader: { failed: function (err) { console.warn('[MathJax] optional component not vendored:', err.message); } },
      tex: { inlineMath: [['\\(', '\\)'], ['$', '$']] },
      svg: { fontCache: 'local' },
      options: { enableMenu: true, menuOptions: { settings: { assistiveMml: false } } }
    };
  </script>
  <script src="assets/mathjax/tex-mml-svg.js"></script>

  <!-- Sim logic -->
  <script src="simulation.js"></script>
</body>
</html>
